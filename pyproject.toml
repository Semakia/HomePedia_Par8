# HOMEPEDIA - tooling configuration (lint / format / test)
# Dependencies are managed via requirements/*.txt, not here.

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-ra -q"

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4"]

[tool.black]
target-version = ["py312"]
line-length = 100
