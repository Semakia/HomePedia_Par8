# HOMEPEDIA - tooling configuration (lint / format / test)
# Dependencies are managed via requirements/*.txt, not here.

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-ra -q"

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI dependency-injection markers are meant to be called in argument
# defaults — that's the framework's idiom, not the B008 anti-pattern.
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Body",
    "fastapi.Header",
]

[tool.ruff.lint.per-file-ignores]
# Tests carry long literal fixtures / prompts; line length isn't meaningful there.
"tests/**" = ["E501"]

[tool.black]
target-version = ["py312"]
line-length = 100
