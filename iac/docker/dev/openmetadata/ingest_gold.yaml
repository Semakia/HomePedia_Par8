# OpenMetadata metadata ingestion — HOMEPEDIA Gold (Postgres).
# Catalogs the SERVED Gold schemas (market, demographics, mobility, services).
#
# Run inside the openmetadata_ingestion container (has the `metadata` CLI):
#   metadata ingest -c /tmp/ingest_gold.yaml
# The __OM_TOKEN__ placeholder is replaced at runtime with an admin JWT
# (the catalog_gold helper logs in and substitutes it).
source:
  type: postgres
  serviceName: homepedia_gold
  serviceConnection:
    config:
      type: Postgres
      username: __PG_USER__
      authType:
        password: __PG_PASSWORD__
      hostPort: __PG_HOSTPORT__
      database: __PG_DATABASE__
  sourceConfig:
    config:
      type: DatabaseMetadata
      schemaFilterPattern:
        includes:
          - "^market$"
          - "^demographics$"
          - "^mobility$"
          - "^services$"
      tableFilterPattern:
        includes:
          - ".*"
sink:
  type: metadata-rest
  config: {}
workflowConfig:
  loggerLevel: INFO
  openMetadataServerConfig:
    hostPort: http://openmetadata-server:8585/api
    authProvider: openmetadata
    securityConfig:
      jwtToken: __OM_TOKEN__
