# =============================================================================
# OpenMetadata ingestion — HOMEPEDIA Silver on S3 (Datalake connector)
# -----------------------------------------------------------------------------
# Template (tracked). Secrets are injected at run time from .env + .bot_jwt into
# a gitignored s3_silver.generated.yaml, then run inside the OM ingestion
# container:
#   metadata ingest -c /tmp/s3_silver.generated.yaml
# Placeholders: {{AWS_ACCESS_KEY_ID}} {{AWS_SECRET_ACCESS_KEY}} {{AWS_REGION}}
#               {{S3_SILVER_BUCKET}} {{BOT_JWT}}
# =============================================================================
source:
  type: datalake
  serviceName: homepedia-s3
  serviceConnection:
    config:
      type: Datalake
      # bucketName/prefix are siblings of configSource (DatalakeConnection
      # fields), NOT inside it. configSource only holds the S3 securityConfig.
      configSource:
        securityConfig:
          awsAccessKeyId: "{{AWS_ACCESS_KEY_ID}}"
          awsSecretAccessKey: "{{AWS_SECRET_ACCESS_KEY}}"
          awsRegion: "{{AWS_REGION}}"
      bucketName: "{{S3_SILVER_BUCKET}}"
      prefix: "dvf"
  sourceConfig:
    config:
      type: DatabaseMetadata
      markDeletedTables: true
      includeTables: true
      includeViews: false

sink:
  type: metadata-rest
  config: {}

workflowConfig:
  loggerLevel: INFO
  openMetadataServerConfig:
    # In-network server name (the metadata CLI runs inside the ingestion container).
    hostPort: "http://openmetadata-server:8585/api"
    authProvider: openmetadata
    securityConfig:
      jwtToken: "{{BOT_JWT}}"
    storeServiceConnection: true
