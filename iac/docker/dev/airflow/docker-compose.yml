# =============================================================================
# HOMEPEDIA - Airflow (DEV, LocalExecutor)
# -----------------------------------------------------------------------------
# Joins the homepedia-net network created by the main dev stack, so it shares
# the same Postgres (separate `airflow` DB), MinIO and Spark.
#
# Start the data plane FIRST, then Airflow (.env auto-loaded from working dir):
#   docker compose -f iac/docker/dev/docker-compose.yml up -d
#   docker compose -f iac/docker/dev/airflow/docker-compose.yml up -d
# (or `task airflow:up`).  Web UI: http://localhost:8080  (admin/admin)
# =============================================================================

name: homepedia-airflow

x-airflow-common: &airflow-common
  # Custom image = stock Airflow + Docker CLI (to `docker exec` spark-submit).
  build:
    context: .
    dockerfile: Dockerfile
  image: homepedia/airflow:dev
  # Same .env as the data plane: gives DAGs the S3/AWS config consumed by
  # S3Loader.from_env() (AWS_*, S3_BRONZE_BUCKET, S3_ENDPOINT_URL).
  # NOTE for MinIO-in-compose: set S3_ENDPOINT_URL=http://minio:9000 (the host
  # value http://localhost:9000 won't reach MinIO from inside this container).
  env_file:
    - ../../../../.env
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@postgres:5432/${AIRFLOW_DB:-airflow}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Providers + ingestion deps are baked into homepedia/airflow:dev (Dockerfile),
    # no startup pip install needed.
    # Make our project code importable from DAGs.
    PYTHONPATH: /opt/airflow/project
  volumes:
    - ../../../../airflow/dags:/opt/airflow/dags
    - ../../../../airflow/plugins:/opt/airflow/plugins
    - airflow_logs:/opt/airflow/logs
    - ../../../../src:/opt/airflow/project/src:ro
    # Docker socket so BashOperator can `docker exec` into spark-master.
    - /var/run/docker.sock:/var/run/docker.sock
  # airflow user (uid 50000) is in group root(0); the mounted socket is group
  # root, so it's reachable. group_add keeps it robust across Docker setups.
  group_add:
    - "0"
  networks:
    - homepedia-net

services:
  # One-shot DB migration + admin user bootstrap.
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username "${AIRFLOW_ADMIN_USER:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Admin --lastname User --role Admin \
          --email admin@homepedia.local || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "${AIRFLOW_WEB_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  airflow_logs:

# Reuse the network created by the main dev compose.
networks:
  homepedia-net:
    external: true
