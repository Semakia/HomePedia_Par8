# HOMEPEDIA - Data quality rules for the DVF Silver layer
# -----------------------------------------------------------------------------
# Declarative quality gate executed by
#   src/data_governance/quality/data_quality_reporter.py (Spark job).
# severity: critical -> fails the task | warning -> logged, does not fail.

dataset: dvf_silver
description: Quality gate for cleaned DVF housing transactions (Silver).

rules:
  # The dataset must not be empty.
  - name: not_empty
    type: volume
    min_rows: 1000
    severity: critical

  # Core analytical columns must be fully populated (Silver already filters them).
  - name: core_columns_complete
    type: completeness
    columns:
      - code_commune
      - date_mutation
      - type_local
      - surface_reelle_bati
      - valeur_fonciere
      - prix_m2
    max_null_pct: 0.0
    severity: critical

  # Price per m2 within the plausible band enforced upstream.
  - name: prix_m2_in_range
    type: range
    column: prix_m2
    min: 500
    max: 20000
    max_violation_pct: 0.0
    severity: critical

  # Built surface must be above the minimum kept in Silver.
  - name: surface_positive
    type: range
    column: surface_reelle_bati
    min: 9
    max: null
    max_violation_pct: 0.0
    severity: critical

  # INSEE commune code: 5 chars, Corsica (2A/2B) tolerated.
  - name: code_commune_format
    type: regex
    column: code_commune
    pattern: '^(2[AB][0-9]{3}|[0-9]{5})$'
    max_violation_pct: 0.0
    severity: critical

  # Only residential locals are expected in the housing Silver.
  - name: type_local_allowed
    type: set
    column: type_local
    allowed: [Maison, Appartement]
    max_violation_pct: 0.0
    severity: critical

  # After the mono-bien filter each mutation should appear once.
  - name: mutation_unique
    type: uniqueness
    columns: [id_mutation]
    max_dup_pct: 1.0
    severity: warning
